services:
  scraper:
    build: ./scraper
    volumes:
      - kdm-data:/data
      - ./scraper/html_pages:/app/html_pages
    environment:
      - DB_PATH=/data/kdm_gear.db
      - HTML_DIR=/app/html_pages
    profiles:
      - scraper

  api:
    build: ./api
    ports:
      - "3000:3000"
    volumes:
      - kdm-data:/data
    environment:
      - DB_PATH=/data/kdm_gear.db
      - IMAGES_PATH=/data/images
    depends_on: []

  web:
    build: ./web
    ports:
      - "5173:5173"
    volumes:
      - ./web/src:/app/src
    depends_on:
      - api

volumes:
  kdm-data:
